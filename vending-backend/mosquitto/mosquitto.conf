# Mosquitto Configuration for the VMFlow Vending Backend
#
# This broker handles MQTT communication between the ESP32 devices
# and the backend MQTT bridge service. It runs inside Docker and is
# accessible on port 1883 within the Docker network.

# Listen on the standard MQTT port
listener 1883

# Enable message persistence so retained messages survive restarts
persistence true
persistence_location /mosquitto/data

# Allow anonymous connections (devices authenticate via XOR payload)
# In production, consider adding password_file for additional security
allow_anonymous true

# Log to stdout (captured by Docker)
log_dest stdout
log_type error
log_type warning
log_type notice
