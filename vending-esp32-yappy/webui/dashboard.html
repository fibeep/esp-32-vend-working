<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>VMflow Vending</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:#0a0a1a;color:#fff;height:100vh;overflow:hidden;
  display:flex;align-items:center;justify-content:center}
.screen{display:none;width:100%;height:100vh;flex-direction:column;
  align-items:center;justify-content:center;padding:2rem;text-align:center}
.screen.active{display:flex}

/* Idle Screen */
#idle-screen{background:linear-gradient(135deg,#0a0a1a 0%,#1a1a3e 100%)}
#idle-screen .logo{font-size:3rem;font-weight:700;color:#6c5ce7;margin-bottom:1rem}
#idle-screen .subtitle{font-size:1.5rem;color:#a0a0c0;margin-bottom:2rem}
#idle-screen .pulse{width:120px;height:120px;border-radius:50%;
  background:rgba(108,92,231,0.15);border:3px solid #6c5ce7;
  display:flex;align-items:center;justify-content:center;
  animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.05);opacity:0.8}}
#idle-screen .pulse-inner{font-size:2.5rem}

/* Payment Screen */
#payment-screen{background:linear-gradient(135deg,#0a0a1a 0%,#1a1a3e 100%)}
.payment-header{margin-bottom:1.5rem}
.payment-header .price{font-size:3.5rem;font-weight:700;color:#00b894}
.payment-header .item-info{font-size:1.2rem;color:#a0a0c0;margin-top:0.3rem}
.qr-container{background:#fff;padding:1.5rem;border-radius:1rem;
  margin:1.5rem 0;display:inline-block}
#qr-canvas{display:block}
.payment-status{font-size:1.3rem;color:#fdcb6e;margin:1rem 0;
  display:flex;align-items:center;justify-content:center;gap:0.5rem}
.spinner{width:24px;height:24px;border:3px solid rgba(253,203,110,0.3);
  border-top-color:#fdcb6e;border-radius:50%;animation:spin 1s linear infinite;
  flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.btn-cancel{background:#d63031;color:#fff;border:none;padding:1rem 3rem;
  font-size:1.2rem;border-radius:0.75rem;cursor:pointer;margin-top:1rem;
  transition:background 0.2s}
.btn-cancel:hover{background:#e74c3c}
.yappy-brand{color:#6c5ce7;font-size:1rem;margin-top:1rem;opacity:0.7}

/* Success Screen */
#success-screen{background:linear-gradient(135deg,#0a0a1a 0%,#00381a 100%)}
.success-icon{font-size:6rem;margin-bottom:1rem;animation:pop 0.5s ease-out}
@keyframes pop{0%{transform:scale(0)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
.success-text{font-size:2rem;font-weight:700;color:#00b894}
.success-sub{font-size:1.3rem;color:#a0a0c0;margin-top:0.5rem}

/* Error Screen */
#error-screen{background:linear-gradient(135deg,#0a0a1a 0%,#3a0a0a 100%)}
.error-icon{font-size:5rem;margin-bottom:1rem}
.error-text{font-size:1.8rem;font-weight:700;color:#d63031}
.error-sub{font-size:1.2rem;color:#a0a0c0;margin-top:0.5rem;max-width:400px}

/* Connectivity status bar */
#status-bar{position:fixed;top:0;left:0;right:0;height:36px;
  display:flex;align-items:center;justify-content:center;gap:1.2rem;
  padding:0 1rem;z-index:50;font-size:0.85rem;
  background:rgba(10,10,26,0.85);border-bottom:1px solid rgba(255,255,255,0.08)}
.status-dot{display:inline-flex;align-items:center;gap:0.35rem}
.status-dot .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.dot-green{background:#00b894;box-shadow:0 0 6px rgba(0,184,148,0.5)}
.dot-red{background:#d63031;box-shadow:0 0 6px rgba(214,48,49,0.5)}
.dot-yellow{background:#fdcb6e;box-shadow:0 0 6px rgba(253,203,110,0.5)}
.status-label{color:#a0a0c0}

/* Connecting overlay */
#connecting{position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(10,10,26,0.95);display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:100}
#connecting.hidden{display:none}
#connecting .spinner{width:48px;height:48px;border-width:4px}
#connecting p{margin-top:1rem;font-size:1.2rem;color:#a0a0c0}
</style>
</head>
<body>

<!-- Connectivity status bar -->
<div id="status-bar">
  <div class="status-dot">
    <div class="dot dot-yellow" id="dot-wifi"></div>
    <span class="status-label" id="lbl-wifi">WiFi</span>
  </div>
  <div class="status-dot">
    <div class="dot dot-yellow" id="dot-mqtt"></div>
    <span class="status-label" id="lbl-mqtt">MQTT</span>
  </div>
  <div class="status-dot">
    <div class="dot dot-yellow" id="dot-machine"></div>
    <span class="status-label" id="lbl-machine">Machine</span>
  </div>
</div>

<!-- Connecting overlay -->
<div id="connecting">
  <div class="spinner"></div>
  <p>Connecting to machine...</p>
</div>

<!-- Idle Screen -->
<div class="screen" id="idle-screen">
  <div class="logo">VMflow</div>
  <div class="subtitle">Select a product on the machine</div>
  <div class="pulse"><div class="pulse-inner">&#x1f6d2;</div></div>
</div>

<!-- Payment Screen -->
<div class="screen" id="payment-screen">
  <div class="payment-header">
    <div class="price" id="pay-price">$0.00</div>
    <div class="item-info">Item #<span id="pay-item">0</span></div>
  </div>
  <div class="qr-container">
    <canvas id="qr-canvas" width="280" height="280"></canvas>
  </div>
  <div class="payment-status">
    <div class="spinner"></div>
    <span>Scan with your Yappy app to pay</span>
  </div>
  <button class="btn-cancel" onclick="cancelPayment()">Cancel</button>
  <div class="yappy-brand">Powered by Yappy</div>
</div>

<!-- Success Screen -->
<div class="screen" id="success-screen">
  <div class="success-icon">&#x2705;</div>
  <div class="success-text">Payment Confirmed!</div>
  <div class="success-sub">Dispensing your product...</div>
</div>

<!-- Error Screen -->
<div class="screen" id="error-screen">
  <div class="error-icon">&#x26A0;&#xFE0F;</div>
  <div class="error-text">Payment Error</div>
  <div class="error-sub" id="error-msg">Something went wrong</div>
</div>

/* Wrapper: render QR to canvas with quiet zone */
var QRGen={render:function(canvas,text,moduleSize){
  moduleSize=moduleSize||8;
  var qr=qrcode(0,'L');
  qr.addData(text);
  qr.make();
  var count=qr.getModuleCount();
  var quiet=4;
  var totalSize=(count+quiet*2)*moduleSize;
  canvas.width=totalSize;canvas.height=totalSize;
  var ctx=canvas.getContext('2d');
  ctx.fillStyle='#ffffff';ctx.fillRect(0,0,totalSize,totalSize);
  ctx.fillStyle='#000000';
  for(var r=0;r<count;r++)for(var c=0;c<count;c++){
    if(qr.isDark(r,c))ctx.fillRect((c+quiet)*moduleSize,(r+quiet)*moduleSize,moduleSize,moduleSize);
  }
  return true;
}};
/* ========================================================================
 * Dashboard Application
 * ======================================================================== */
var currentScreen='connecting';
var lastYappyState='';
var pollTimer=null;
var connected=false;

function showScreen(id){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active')});
  var el=document.getElementById(id);
  if(el)el.classList.add('active');
  currentScreen=id;
}

function formatPrice(price){
  return'$'+(price/100).toFixed(2);
}

function setDot(id,ok){
  var el=document.getElementById(id);
  el.className='dot '+(ok?'dot-green':'dot-red');
}

function updateDashboard(data){
  if(!connected){
    connected=true;
    document.getElementById('connecting').classList.add('hidden');
  }

  /* Update connectivity status bar */
  setDot('dot-wifi',data.wifi_connected);
  setDot('dot-mqtt',data.mqtt_connected);
  /* Machine is reachable if we got a response (always true here) and MDB state > 0 */
  setDot('dot-machine',data.machine_state>0);

  var yState=data.yappy_state||'IDLE';
  var mState=data.machine_state||0;

  switch(yState){
    case'IDLE':
      if(currentScreen!=='idle-screen')showScreen('idle-screen');
      break;

    case'QR_PENDING':
      if(currentScreen!=='payment-screen')showScreen('payment-screen');
      document.getElementById('pay-price').textContent=formatPrice(data.item_price||0);
      document.getElementById('pay-item').textContent=data.item_number||0;
      break;

    case'QR_READY':
    case'POLLING':
      if(currentScreen!=='payment-screen')showScreen('payment-screen');
      document.getElementById('pay-price').textContent=formatPrice(data.item_price||0);
      document.getElementById('pay-item').textContent=data.item_number||0;
      /* Render QR code if hash changed */
      if(data.qr_hash&&data.qr_hash!==lastYappyState){
        var canvas=document.getElementById('qr-canvas');
        QRGen.render(canvas,data.qr_hash,6);
        lastYappyState=data.qr_hash;
      }
      break;

    case'PAID':
      if(currentScreen!=='success-screen')showScreen('success-screen');
      lastYappyState='';
      break;

    case'ERROR':
      if(currentScreen!=='error-screen'){
        showScreen('error-screen');
        document.getElementById('error-msg').textContent=data.error||'Something went wrong';
      }
      lastYappyState='';
      break;

    default:
      if(currentScreen!=='idle-screen')showScreen('idle-screen');
  }
}

function pollState(){
  fetch('/api/v1/vending/state')
    .then(function(r){return r.json()})
    .then(function(data){updateDashboard(data)})
    .catch(function(e){
      if(connected){
        connected=false;
        document.getElementById('connecting').classList.remove('hidden');
      }
    });
}

function cancelPayment(){
  fetch('/api/v1/vending/cancel',{method:'POST'})
    .then(function(){lastYappyState='';})
    .catch(function(e){console.error('Cancel failed:',e)});
}

/* Start polling */
pollTimer=setInterval(pollState,500);
pollState();
</script>
